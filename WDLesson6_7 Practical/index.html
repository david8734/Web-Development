<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NYC Collision Data</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>NYC Motor Vehicle Collision Dataset</h1>
    <p>View and filter NYC collision data</p>
  </header>

  <section id="filters">

    <div class="filter-box">
      <label>Filter by Borough:</label>
      <input type="text" id="borough" placeholder="e.g. Brooklyn">
      <button onclick="filterByBorough()">Search</button>
    </div>

    <div class="filter-box">
  <label>Filter by Vehicle Type:</label>
  <input type="text" id="vehicle" placeholder="e.g. Sedan">
</div>

    <div id="result"></div>

  </section>

  <section>
    <h2>Results</h2>
    <div id="output"></div>
  </section>

  <script src="script.js"></script>

</body>
</html>
